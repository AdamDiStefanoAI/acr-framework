apiVersion: apps/v1
kind: Deployment
metadata:
  name: acr-opa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acr-opa
  template:
    metadata:
      labels:
        app: acr-opa
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:0.70.0
          args:
            - run
            - --server
            - --addr=0.0.0.0:8181
            - --log-format=json
            - --set=services.acr.url=http://acr-gateway:8000
            - --set=discovery.resource=/acr/policy-bundles/discovery.json
          ports:
            - containerPort: 8181
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
