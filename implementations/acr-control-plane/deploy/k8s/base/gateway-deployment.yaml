apiVersion: apps/v1
kind: Deployment
metadata:
  name: acr-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acr-gateway
  template:
    metadata:
      labels:
        app: acr-gateway
    spec:
      serviceAccountName: acr-gateway
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: acr-gateway
              topologyKey: kubernetes.io/hostname
      containers:
        - name: gateway
          image: acr-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: acr-gateway-config
            - secretRef:
                name: acr-gateway-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /acr/health
              port: 8000
            failureThreshold: 24
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /acr/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /acr/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
