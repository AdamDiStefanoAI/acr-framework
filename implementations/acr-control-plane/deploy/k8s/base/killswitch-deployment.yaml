apiVersion: apps/v1
kind: Deployment
metadata:
  name: acr-killswitch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acr-killswitch
  template:
    metadata:
      labels:
        app: acr-killswitch
    spec:
      serviceAccountName: acr-killswitch
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: acr-killswitch
              topologyKey: kubernetes.io/hostname
      containers:
        - name: killswitch
          image: acr-killswitch:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: acr-gateway-secret
                  key: REDIS_URL
            - name: KILLSWITCH_SECRET
              valueFrom:
                secretKeyRef:
                  name: acr-gateway-secret
                  key: KILLSWITCH_SECRET
            - name: OPERATOR_API_KEYS_JSON
              valueFrom:
                secretKeyRef:
                  name: acr-gateway-secret
                  key: OPERATOR_API_KEYS_JSON
            - name: ACR_ENV
              value: "production"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /acr/health
              port: 8443
            failureThreshold: 24
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8443
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
