apiVersion: v1
kind: ConfigMap
metadata:
  name: acr-gateway-config
data:
  ACR_ENV: "production"
  LOG_LEVEL: "INFO"
  SCHEMA_BOOTSTRAP_MODE: "validate"
  STRICT_DEPENDENCY_STARTUP: "true"
  OPA_URL: "http://acr-opa:8181"
  KILLSWITCH_URL: "http://acr-killswitch:8443"
  OTEL_SERVICE_NAME: "acr-control-plane"
  EXECUTE_ALLOWED_ACTIONS: "true"
  POLICY_BUNDLE_BACKEND: "s3"
  POLICY_BUNDLE_S3_BUCKET: "change-me"
  POLICY_BUNDLE_S3_PREFIX: "acr/policy-bundles"
  OIDC_ENABLED: "true"
  OIDC_ISSUER: "https://login.example.com/"
  OIDC_CLIENT_ID: "acr-control-plane"
  OIDC_AUTHORIZE_URL: "https://login.example.com/oauth2/v1/authorize"
  OIDC_TOKEN_URL: "https://login.example.com/oauth2/v1/token"
  OIDC_JWKS_URL: "https://login.example.com/oauth2/v1/keys"
  OIDC_REDIRECT_URI: "https://acr.example.com/acr/auth/oidc/callback"
  OIDC_SCOPES: "openid profile email groups"
  OIDC_ROLES_CLAIM: "groups"
  OIDC_SUBJECT_CLAIM: "email"
  OIDC_ROLE_MAPPING_JSON: >
    {"acr-platform-admin":["agent_admin","security_admin","auditor","killswitch_operator","approver"],
     "acr-approver":["approver"],
     "acr-auditor":["auditor"]}
  EXECUTOR_INTEGRATIONS_JSON: >
    {"issue_refund":{"provider":"refund_api","url":"https://refunds.internal/api/refunds","api_key":"env:FINANCE_EXECUTOR_API_KEY","default_currency":"USD"},
     "send_email":{"provider":"email_api","url":"https://messaging.internal/api/send","api_key":"env:EMAIL_EXECUTOR_API_KEY","from_address":"ops@example.com"},
     "create_ticket":{"provider":"ticket_api","url":"https://tickets.internal/api/tickets","api_key":"env:TICKET_EXECUTOR_API_KEY","default_queue":"operations"}}
