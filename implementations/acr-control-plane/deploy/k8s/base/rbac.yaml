apiVersion: v1
kind: ServiceAccount
metadata:
  name: acr-gateway
  namespace: acr-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: acr-killswitch
  namespace: acr-system
---
# Minimal Role — no cluster permissions needed
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: acr-gateway-role
  namespace: acr-system
rules: []  # least privilege — no rules needed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: acr-gateway-rolebinding
  namespace: acr-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: acr-gateway-role
subjects:
- kind: ServiceAccount
  name: acr-gateway
  namespace: acr-system
