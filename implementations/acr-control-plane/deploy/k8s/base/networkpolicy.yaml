# Default deny all traffic in acr-system namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: acr-default-deny
  namespace: acr-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Gateway: allow ingress from ingress-controller namespace, egress to postgres/redis/opa
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: acr-gateway-netpol
  namespace: acr-system
spec:
  podSelector:
    matchLabels:
      app: acr-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-controller
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # OPA
    - to:
        - podSelector:
            matchLabels:
              app: acr-opa
      ports:
        - protocol: TCP
          port: 8181
    # Killswitch
    - to:
        - podSelector:
            matchLabels:
              app: acr-killswitch
      ports:
        - protocol: TCP
          port: 8443
---
# Killswitch: allow ingress from gateway only, egress to postgres/redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: acr-killswitch-netpol
  namespace: acr-system
spec:
  podSelector:
    matchLabels:
      app: acr-killswitch
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: acr-gateway
      ports:
        - protocol: TCP
          port: 8443
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
---
# OPA: allow ingress from gateway only, no external egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: acr-opa-netpol
  namespace: acr-system
spec:
  podSelector:
    matchLabels:
      app: acr-opa
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: acr-gateway
      ports:
        - protocol: TCP
          port: 8181
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow OPA to fetch bundles from gateway
    - to:
        - podSelector:
            matchLabels:
              app: acr-gateway
      ports:
        - protocol: TCP
          port: 8000
